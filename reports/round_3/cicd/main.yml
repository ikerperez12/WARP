# CI/CD Pipeline con GitHub Actions y Turborepo
#
# Nombre del archivo: .github/workflows/main.yml
#
# Este workflow se encarga de la Integración Continua (CI) del monorepo.
# Se activa en cada 'push' y 'pull request' a la rama 'main'.
# Su objetivo es asegurar que el código nuevo cumple con los estándares de
# calidad (linting), pasa los tests y se puede construir (build) correctamente.
#
# Utiliza Turborepo para optimizar el proceso, ejecutando tareas solo en los
# paquetes que han sido afectados por los cambios, lo que ahorra tiempo y recursos.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Nombre del job: 'ci' (Continuous Integration)
  ci:
    # Se ejecuta en la última versión estable de Ubuntu
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      # - Clona el repositorio en la máquina virtual del runner.
      # - `fetch-depth: 0` es necesario para que Turborepo pueda comparar
      #   correctamente los cambios con la rama base.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Instalar y configurar PNPM
      # - Se utiliza la acción oficial de pnpm para instalar el gestor de paquetes.
      # - Esto asegura que se use la misma herramienta que en local.
      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8 # O la versión que se esté utilizando en el proyecto

      # 3. Instalar y configurar Node.js
      # - Configura el entorno de Node.js.
      # - `cache: 'pnpm'` es una optimización clave: guarda las dependencias
      #   descargadas en el caché de GitHub Actions para acelerar futuras ejecuciones.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Se recomienda usar una versión LTS
          cache: 'pnpm'

      # 4. Instalar dependencias
      # - Ejecuta `pnpm install` para descargar e instalar todas las dependencias
      #   del monorepo de forma eficiente.
      - name: Install Dependencies
        run: pnpm install

      # 5. Ejecutar Linting en los paquetes afectados
      # - `turbo run lint`: Turborepo ejecuta el script 'lint' definido en el package.json de cada paquete.
      # - `--filter=...[origin/main]`: Este es el "filtro de afectación". Le dice a
      #   Turborepo que solo ejecute la tarea en los paquetes que han cambiado
      #   en comparación con la rama 'main'.
      - name: Run Lint on Affected Packages
        run: npx turbo run lint --filter=...[origin/main]

      # 6. Ejecutar Tests en los paquetes afectados
      # - Misma lógica que el linting, pero para la tarea 'test'.
      - name: Run Tests on Affected Packages
        run: npx turbo run test --filter=...[origin/main]

      # 7. Construir los paquetes afectados
      # - `turbo run build`: Ejecuta el script de 'build' (ej. `vite build`).
      # - Gracias al cacheo de Turborepo, si un paquete no ha cambiado,
      #   Turborepo restaurará el 'dist' de un build anterior en milisegundos.
      - name: Build Affected Packages
        run: npx turbo run build --filter=...[origin/main]

      # (Opcional) Paso futuro: Despliegue
      # - Si el workflow se ejecuta en la rama 'main' (tras un merge), se podría
      #   añadir un paso aquí para desplegar las aplicaciones a un servicio como Vercel o Netlify.
      #
      # - name: Deploy to Vercel
      #   if: github.ref == 'refs/heads/main'
      #   run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
